workflows:
  ios-production:
    name: ValuIQ iOS Production
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.valuiq.app
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild
        script: npx expo prebuild --platform ios --clean
      - name: Install pods
        script: cd ios && pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa --workspace "ios/valuiq.xcworkspace" --scheme "valuiq"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        apple_id: 
        password: 
        submit_to_testflight: true
